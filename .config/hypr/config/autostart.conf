# ~/.config/hypr/config/autostart.conf

# env = XKB_DEFAULT_LAYOUT,latam

# launcher
exec-once = anyrun daemon

exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'catppuccin-mocha-blue-standard+default'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# Fondo de Pantalla
exec-once = hyprpaper

exec-once = swaync

exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user restart pipewire wireplumber

# Bar
exec-once = ironbar

# Input Method
exec-once = fcitx5 -d

exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = xsettingsd

exec-once = systemctl --user start hyprpolkitagent

exec-once = systemctl --user start syncthing

# clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# TimeOut
exec-once = hypridle
