# =============================================================================
# ~/.config/hypr/config/environment.conf
# =============================================================================

# ─── XDG ──────────────────────────────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ─── Toolkits ─────────────────────────────────────────────────────────────────
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1

# ─── Input method (fcitx5) ────────────────────────────────────────────────────
env = XMODIFIERS,@im=fcitx5

# ─── GTK Theme ────────────────────────────────────────────────────────────────
env = GTK_THEME,catppuccin-mocha-blue-standard+default
env = GTK_ICON_THEME,Papirus-Dark
env = GTK_APPLICATION_PREFER_DARK_THEME,1

# ─── Screenshots (grimblast) ──────────────────────────────────────────────────
env = GRIMBLAST_SCREENSHOTS_DIR,$HOME/Pictures/Screenshots
