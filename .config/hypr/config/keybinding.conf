# config/hypr/config/keybinding.conf

# SUPER KEY
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts

# Variables
$term = kitty
$launcher = anyrun
$explorer = spacedrive
$browser = brave
$notify = swaync-client

# ─── Applications ─────────────────────────────────────────────────────────────
bind = $mainMod,       RETURN, exec, $term
bind = $mainMod,       SPACE,  exec, $launcher
bind = $mainMod,       E,      exec, $explorer
bind = $mainMod,       B,      exec, $browser

# ─── Hyprland Utilities ───────────────────────────────────────────────────────
bind = $mainMod SHIFT,  L,      exec,   hyprlock               # screen lock
bind = CTRL ALT,        DELETE, exec,   $scriptsDir/wlogout.sh # power menu
 
# ─── Hyprswitch (window tabs) ─────────────────────────────────────────────────
bind = $mainMod, TAB, exec, hyprswitch gui --mod-key super --key tab --close mod-key-release
bindrt = $mainMod, TAB, exec, hyprswitch close

# ─── Window Management ────────────────────────────────────────────────────────
bind = $mainMod,       Q,     killactive                              # close window
bind = $mainMod SHIFT, Q,     exec, $scriptsDir/KillActiveProcess.sh # force kill
 
bind = $mainMod,       F,     fullscreen,      0  # real fullscreen
bind = $mainMod SHIFT, F,     fullscreen,      1  # maximize (keep bar)
 
bind = $mainMod,       V,     togglefloating      # toggle float on focused window
bind = $mainMod,       C,     exec, $scriptsDir/clipboard.sh  # clipboard history

# Mouse: move / resize floating windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# ─── Workspaces ───────────────────────────────────────────────────────────────
bind = $mainMod CTRL, left,  workspace, -1
bind = $mainMod CTRL, right, workspace, +1

# Switch to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ─── Brightness ───────────────────────────────────────────────────────────────
bind = , XF86MonBrightnessUp,   exec, brightnessctl -q s 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-

# ─── Volume ───────────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, $scriptsDir/volume.sh --inc
bindel = , XF86AudioLowerVolume, exec, $scriptsDir/volume.sh --dec
bindl  = , XF86AudioMicMute,     exec, $scriptsDir/volume.sh --toggle-mic
bindl  = , XF86AudioMute,        exec, $scriptsDir/volume.sh --toggle

# bindl  = , XF86AudioPlay, exec, $scriptsDir/Playback.sh -- # play-pause
# bindl  = , XF86AudioPause, exec, $scriptsDir/Playback.sh -- # play-pause
# bindl  = , XF86AudioNext, exec, $scriptsDir/Playback.sh -- # next
# bindl  = , XF86AudioPrev, exec, $scriptsDir/Playback.sh -- # previous

# ─── Screenshots (grimblast) ──────────────────────────────────────────────────
bind = ,               PRINT,       exec, grimblast copy screen    # fullscreen → clipboard
bind = $mainMod,       PRINT,       exec, grimblast save screen    # fullscreen → guardar en disco
bind = $mainMod SHIFT, PRINT,       exec, grimblast save area      # área → guardar en disco
bind = SHIFT,          PRINT,       exec, grimblast copy area      # área → clipboard
bind = $mainMod SHIFT, S,           exec, grimblast edit area      # área → swappy
bind = $mainMod CTRL SHIFT, S,      exec, grimblast edit screen    # fullscreen → swappy

# ─── Notifycations ──────────────────────────────────────────────────
bind = $mainMod, N, exec, $notify --toggle-panel   # abrir/cerrar panel
bind = $mainMod SHIFT, N, exec, $notify --close-latest    # descartar última notificaión
