# =============================================================================
# config/hypr/config/windowrule.conf
# =============================================================================
# Tip: usa `hyprctl clients` para ver class/title de cualquier ventana abierta.
# =============================================================================

# ─── Generic Float Defaults ───────────────────────────────────────────────────
# Cualquier ventana flotante (activada con $mainMod+V) se centra automáticamente.
windowrule = center on, match:float true

# ─── swappy (editor de capturas) ──────────────────────────────────────────────
windowrule {
    name    = float-swappy
    match:class = swappy

    float   = on
    size    = 900 600
    center  = on
}

# ─── oculante (visor de imágenes) ─────────────────────────────────────────────
windowrule {
    name    = float-oculante
    match:class = oculante

    float   = on
    size    = 1100 700
    center  = on
}

# ─── zoom ─────────────────────────────────────────────────────────────────────
# La ventana principal de Zoom suele tener class "zoom" y distintos títulos.
# Las sub-ventanas (settings, chat) también flotan con tamaño reducido.

windowrule {
    name    = float-zoom-main
    match:class = zoom
    match:title = Zoom

    float   = on
    size    = 860 580
    center  = on
}

windowrule {
    name    = float-zoom-sub
    match:class = zoom

    float   = on
    size    = 700 500
    center  = on
}

# ─── wlogout (power menu) ─────────────────────────────────────────────────────
# wlogout es una layer, no una ventana — sus reglas van en layerrule.
# Se deja aquí como referencia por si usas un wrapper que genera ventana:
# windowrule = float on, match:class wlogout

# ─── Dialogs & Modals (genérico) ──────────────────────────────────────────────
# Ventanas modales ("¿estás seguro?", selección de archivo, etc.) siempre flotan.
windowrule = float on,  match:modal true
windowrule = center on, match:modal true

# ─── Notas sobre clases ───────────────────────────────────────────────────────
# swappy   → class: swappy
# oculante → class: oculante   (verifica con `hyprctl clients` si cambia)
# zoom     → class: zoom        (algunas builds usan "Zoom" con mayúscula)
#
# Si una regla no aplica, comprueba la clase exacta con:
#   hyprctl clients | grep -E "class|title"