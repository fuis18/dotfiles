"settings" = "оҳ• "
"Private" = "п„Ў "

[git_branch]
symbol = "пҗҳ"
style = "bg:#3e4042"
format = '[[ $symbol $branch ](fg:#3387c8 bg:#303030)]($style)'

[git_status]
style = "bg:#3e4042"
format = '[[($all_status$ahead_behind )](fg:#3387c8 bg:#303030)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#3e4042"
format = '[[ $symbol ($version) ](fg:#3387c8 bg:#3e4042)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#3e4042"
